# =============================================================================
# PhySATFormer Model Configuration
# =============================================================================

# Input
input_dim: 1
num_channels: 76

# Channel Encoder
channel_embedding_dim: 32

# Temporal Transformer
d_model: 128
num_heads: 8

# Architecture Depth
num_channel_layers: 2
num_temporal_layers: 4

# Feed Forward Network
ff_dim: 512

# Regularization
dropout: 0.1

model_type: physatformer