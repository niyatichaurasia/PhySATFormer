# =============================================================================
# Training Configuration
# =============================================================================

epochs: 50
batch_size: 32

learning_rate: 0.0001
weight_decay: 0.01

optimizer:
  betas: [0.9, 0.999]
  eps: 1.0e-8

scheduler:
  t_max: 50
  eta_min: 1.0e-6

gradient_clip: 1.0

early_stopping:
  patience: 10
  min_delta: 0.001

checkpoint_dir: checkpoints/physatformer

num_workers: 4
shuffle: true

device: auto

pin_memory: true
persistent_workers: true
prefetch_factor: 4

mixed_precision: true